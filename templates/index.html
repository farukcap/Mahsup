<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EsnafAğı - Teknofest Projesi</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; margin: 40px; color: #333; }
        .container { max-width: 600px; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin: auto; }
        h2 { color: #2c3e50; text-align: center; }
        .input-group { display: flex; gap: 10px; margin-bottom: 10px; }
        input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 6px; }
        button { padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .btn-add { background-color: #3498db; color: white; width: 100%; margin-bottom: 20px; }
        .btn-calc { background-color: #2ecc71; color: white; width: 100%; font-size: 16px; }
        #liste { margin-bottom: 20px; background: #eee; padding: 10px; border-radius: 6px; font-size: 14px; }
        #sonuc { margin-top: 20px; padding: 15px; border-radius: 6px; background: #e8f8f5; border-left: 5px solid #2ecc71; white-space: pre-line; display: none; }
    </style>
</head>
<body>

<div class="container">
    <h2>🏆 EsnafAğı - Borç Döngüsü Tespit Sistemi</h2>
    <p style="text-align: center; color: #7f8c8d;">Teknofest Finansal Teknolojiler Yarışması Prototipi</p>
    
    <div class="input-group">
        <input type="text" id="borclu" placeholder="Borçlu Esnaf (Örn: Can)">
        <input type="text" id="alacakli" placeholder="Alacaklı Esnaf (Örn: Ahmet)">
        <input type="number" id="miktar" placeholder="Miktar (TL)">
    </div>
    <button class="btn-add" onclick="borclariListeyeEkle()">➕ Borç İlişkisi Ekle</button>

    <h4>Eklenen Borçlar:</h4>
    <div id="liste">Henüz borç eklenmedi.</div>

    <button class="btn-calc" onclick="algoritmayiCalistir()">🚀 Döngüleri Bul ve Mahsup Et</button>

    <div id="sonuc"></div>
</div>

<script>
    let borcHavuzu = [];

    function borclariListeyeEkle() {
        const borclu = document.getElementById('borclu').value;
        const alacakli = document.getElementById('alacakli').value;
        const miktar = document.getElementById('miktar').value;

        if(!borclu || !alacakli || !miktar) { alert("Lütfen tüm alanları doldurun!"); return; }

        borcHavuzu.push({ borclu, alacakli, miktar });
        
        // Listeyi güncelle
        const listeDiv = document.getElementById('liste');
        if(borcHavuzu.length === 1) listeDiv.innerHTML = "";
        listeDiv.innerHTML += `• <b>${borclu}</b>, <b>${alacakli}</b> isimli esnafa <b>${miktar} TL</b> borçlu.<br>`;
        
        // Temizle
        document.getElementById('borclu').value = "";
        document.getElementById('alacakli').value = "";
        document.getElementById('miktar').value = "";
    }

    function algoritmayiCalistir() {
        if(borcHavuzu.length === 0) { alert("Önce borç eklemelisiniz!"); return; }

        fetch('/hesapla', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ borclar: borcHavuzu })
        })
        .then(res => res.json())
        .then(data => {
            const sonucDiv = document.getElementById('sonuc');
            sonucDiv.style.display = "block";
            sonucDiv.innerText = data.sonuc;
        });
    }
</script>

</body>
</html>
